<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đọc Sách & Học Từ Vựng</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf_viewer.min.css">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh; 
            overflow: hidden; 
            user-select: none; 
            -webkit-user-select: none;
        }

        .toolbar {
            background-color: #1a252f;
            width: 100%;
            padding: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .page-info {
            color: white;
            font-size: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #page-input {
            width: 45px;
            padding: 5px;
            text-align: center;
            border: 2px solid #34495e;
            background-color: #ecf0f1;
            border-radius: 4px;
            font-weight: bold;
            font-size: 15px;
            outline: none;
        }

        #page-input:focus { border-color: #1abc9c; }

        /* KHU VỰC ĐỌC SÁCH */
        .reader-container {
            flex: 1; 
            width: 100%;
            overflow: auto; 
            background-color: #34495e; 
            display: block; 
            text-align: center; 
            touch-action: pan-x pan-y; 
            padding: 10px 0; 
        }

        #page-container {
            position: relative;
            margin: 0 auto;
            width: 100%; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            background-color: white;
        }

        #pdf-render {
            width: 100%; 
            height: auto;
            display: block; 
        }

        #text-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: auto;
            bottom: auto;
            transform-origin: 0 0; 
            z-index: 2;
            user-select: text; 
            -webkit-user-select: text;
        }

        #text-layer span {
            color: transparent; 
            position: absolute;
            white-space: pre;
            cursor: text;
            transform-origin: 0% 0%;
        }

        #text-layer ::selection {
            background: rgba(26, 188, 156, 0.4); 
        }

        .flip-next-anim { animation: flipNext 0.5s ease-in-out; }
        .flip-prev-anim { animation: flipPrev 0.5s ease-in-out; }

        @keyframes flipNext {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(-90deg); opacity: 0.3; }
            50.1% { transform: rotateY(90deg); opacity: 0.3; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        @keyframes flipPrev {
            0% { transform: rotateY(0deg); opacity: 1; }
            50% { transform: rotateY(90deg); opacity: 0.3; }
            50.1% { transform: rotateY(-90deg); opacity: 0.3; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        /* TOOLTIP BÔI ĐEN */
        #selection-tooltip {
            position: fixed;
            display: none;
            background-color: #2c3e50;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transform: translate(-50%, -100%);
            margin-top: -10px;
        }

        #selection-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: #2c3e50 transparent transparent transparent;
        }

        #selection-tooltip:hover { background-color: #1abc9c; }

        /* NÚT NỔI (FAB) */
        .fab-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: #1abc9c;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 1001;
            transition: transform 0.2s, background-color 0.2s;
        }

        .fab-btn:hover {
            background-color: #16a085;
            transform: scale(1.05);
        }

        /* KHUNG TRA CỨU TỪ VỰNG */
        .dictionary-pane {
            position: fixed;
            bottom: 100px; 
            right: 30px;
            width: 350px;
            max-width: calc(100vw - 40px);
            height: 40vh; 
            min-height: 250px;
            background-color: #f4f7f6;
            border-radius: 12px;
            display: none; 
            flex-direction: column;
            box-shadow: 0 5px 25px rgba(0,0,0,0.3);
            z-index: 1000;
            overflow: hidden;
            user-select: text; 
            -webkit-user-select: text;
        }

        .dictionary-pane.show {
            display: flex; 
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dict-header {
            display: flex;
            padding: 12px;
            background-color: #ecf0f1;
            gap: 10px;
            align-items: center;
            border-bottom: 1px solid #bdc3c7;
        }

        .dict-header input {
            flex: 1;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 15px;
            outline: none;
        }
        
        .dict-header input:focus {
            border-color: #1abc9c;
            box-shadow: 0 0 5px rgba(26, 188, 156, 0.3);
        }

        .dict-header button {
            background-color: #1abc9c;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }

        .dict-header button:hover { background-color: #16a085; }

        .dict-result {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            font-size: 16px;
            color: #2c3e50;
            background: white;
        }

        .word-title-container {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .dict-result h3 {
            margin: 0;
            color: #e74c3c;
            font-size: 20px;
        }

        .ipa-text {
            font-size: 15px;
            color: #2980b9;
            font-family: 'Lucida Sans Unicode', sans-serif;
            background-color: #e8f4f8;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .speak-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 0;
            transition: transform 0.1s;
        }

        .speak-btn:hover { transform: scale(1.1); }
        .speak-btn:active { transform: scale(0.9); }
        
        .dict-result .meaning {
            font-size: 16px;
            line-height: 1.5;
            padding-top: 5px;
            border-top: 1px dashed #bdc3c7;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="toolbar">
        <div class="page-info">
            Trang 
            <input type="number" id="page-input" value="1" min="1"> 
            / <span id="page-count">---</span>
        </div>
    </div>

    <div class="reader-container" id="wrapper">
        <div id="page-container">
            <canvas id="pdf-render"></canvas>
            <div id="text-layer" class="textLayer"></div>
        </div>
    </div>

    <div id="selection-tooltip">Dịch 🔍</div>

    <div class="fab-btn" id="fab-btn" title="Mở từ điển">🔍</div>

    <div class="dictionary-pane" id="dictionary-pane">
        <div class="dict-header">
            <input type="text" id="dict-input" placeholder="Gõ câu hoặc từ tiếng Anh..." autocomplete="off">
            <button id="dict-search">Dịch</button>
        </div>
        <div id="dict-result" class="dict-result">
            <em>Kết quả dịch sẽ hiển thị ở đây.</em>
        </div>
    </div>

    <script>
        const url = 'Science.pdf';

        let pdfDoc = null, pageNum = 1, pageIsRendering = false, pageNumIsPending = null,
            canvas = document.querySelector('#pdf-render'), ctx = canvas.getContext('2d'),
            pageInput = document.querySelector('#page-input'), wrapper = document.querySelector('#wrapper'),
            pageContainer = document.querySelector('#page-container'), textLayerDiv = document.querySelector('#text-layer');

        let cssZoom = 100, initialDistance = null, initialZoom = 100, touchStartX = 0, currentViewport = null;

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // --- ĐÓNG / MỞ KHUNG TỪ ĐIỂN ---
        const fabBtn = document.getElementById('fab-btn');
        const dictionaryPane = document.getElementById('dictionary-pane');
        const searchInput = document.getElementById('dict-input');

        const toggleDictionary = (forceOpen = false) => {
            if (forceOpen) dictionaryPane.classList.add('show');
            else dictionaryPane.classList.toggle('show');
            
            if (dictionaryPane.classList.contains('show')) {
                searchInput.focus();
                fabBtn.innerHTML = '✖';
            } else { fabBtn.innerHTML = '🔍'; }
        };

        fabBtn.addEventListener('click', () => toggleDictionary());

        // --- TÍNH NĂNG DỊCH + IPA + ÂM THANH ---
        const searchBtn = document.getElementById('dict-search');
        const resultDiv = document.getElementById('dict-result');

        const translateWord = async (textToTranslate = null) => {
            const text = textToTranslate || searchInput.value.trim();
            if (!text) return;
            
            searchInput.value = text; 
            resultDiv.innerHTML = '<span style="color: #7f8c8d;">Đang tra cứu... ⏳</span>';
            
            try {
                // 1. Lấy nghĩa tiếng Việt từ Google Translate
                const apiURL = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=vi&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(apiURL);
                const data = await response.json();
                
                let meaning = "";
                data[0].forEach(item => { meaning += item[0]; });

                // 2. Lấy IPA từ Free Dictionary API (Cải tiến dò tìm)
                let ipaHTML = "";
                const words = text.trim().split(/\s+/);
                
                // Chỉ tra từ điển gốc khi bôi đen 1-2 từ (tránh tra nguyên câu gây lỗi API)
                if (words.length <= 2) {
                    try {
                        // Lọc bỏ dấu câu (, . ! ?) và chuyển về chữ thường để tỷ lệ trúng từ điển cao nhất
                        const wordToSearch = words[0].toLowerCase().replace(/[^a-z-]/g, ''); 
                        if (wordToSearch) {
                            const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${wordToSearch}`);
                            if (dictRes.ok) {
                                const dictData = await dictRes.json();
                                
                                // Tìm IPA: Ưu tiên thuộc tính 'phonetic' gốc, nếu không có thì lục tìm trong mảng 'phonetics'
                                let ipaText = dictData[0]?.phonetic;
                                if (!ipaText) {
                                    const phoneticObj = dictData[0]?.phonetics?.find(p => p.text);
                                    if (phoneticObj) ipaText = phoneticObj.text;
                                }
                                
                                if (ipaText) {
                                    ipaHTML = `<span class="ipa-text">${ipaText}</span>`;
                                }
                            }
                        }
                    } catch (e) { console.log("Không tìm thấy IPA cho từ này."); }
                }
                
                // 3. Hiển thị Giao diện
                resultDiv.innerHTML = `
                    <div class="word-title-container">
                        <h3>${text}</h3>
                        ${ipaHTML}
                        <button id="speak-btn" class="speak-btn" title="Nghe phát âm">🔊</button>
                    </div>
                    <div class="meaning">👉 <strong>${meaning}</strong></div>
                `;

                // 4. Gắn sự kiện phát âm
                document.getElementById('speak-btn').addEventListener('click', () => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US'; 
                    utterance.rate = 0.9;     
                    window.speechSynthesis.speak(utterance);
                });

            } catch (error) {
                resultDiv.innerHTML = '<span style="color: red;">Lỗi kết nối. Vui lòng kiểm tra mạng của bạn.</span>';
            }
        };

        searchBtn.addEventListener('click', () => translateWord());
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { translateWord(); searchInput.blur(); }
        });

        // --- TÍNH NĂNG BÔI ĐEN & HIỆN TOOLTIP ---
        const selectionTooltip = document.getElementById('selection-tooltip');

        const handleSelection = () => {
            setTimeout(() => {
                const selection = window.getSelection();
                const text = selection.toString().trim();
                
                if (text.length > 0 && selection.rangeCount > 0) {
                    const range = selection.getRangeAt(0);
                    const rect = range.getBoundingClientRect();
                    selectionTooltip.style.display = 'block';
                    selectionTooltip.style.left = `${rect.left + (rect.width / 2)}px`;
                    selectionTooltip.style.top = `${rect.top}px`;
                } else { selectionTooltip.style.display = 'none'; }
            }, 50); 
        };

        wrapper.addEventListener('mouseup', handleSelection);
        wrapper.addEventListener('touchend', handleSelection);

        document.addEventListener('mousedown', (e) => {
            if (e.target !== selectionTooltip && !selectionTooltip.contains(e.target)) {
                selectionTooltip.style.display = 'none';
            }
        });

        selectionTooltip.addEventListener('click', () => {
            const selectedText = window.getSelection().toString().trim();
            if (selectedText) {
                toggleDictionary(true); 
                translateWord(selectedText);
                selectionTooltip.style.display = 'none';
                window.getSelection().removeAllRanges();
            }
        });

        // --- ĐỒNG BỘ SCALE LỚP CHỮ VÀ ẢNH ---
        const updateTextLayerScale = () => {
            if (!currentViewport) return;
            const containerWidth = pageContainer.getBoundingClientRect().width;
            const scaleRatio = containerWidth / currentViewport.width;
            textLayerDiv.style.transform = `scale(${scaleRatio})`;
        };
        window.addEventListener('resize', updateTextLayerScale);

        // --- RENDER PDF ---
        const playFlipAnimation = (direction) => {
            pageContainer.classList.remove('flip-next-anim', 'flip-prev-anim');
            void pageContainer.offsetWidth; 
            pageContainer.classList.add(direction === 'next' ? 'flip-next-anim' : 'flip-prev-anim');
        };

        const renderPage = num => {
            pageIsRendering = true;
            pdfDoc.getPage(num).then(page => {
                const renderScale = window.devicePixelRatio > 1 ? window.devicePixelRatio * 1.5 : 2.5; 
                currentViewport = page.getViewport({ scale: renderScale });
                
                canvas.height = currentViewport.height;
                canvas.width = currentViewport.width;
                const renderCtx = { canvasContext: ctx, viewport: currentViewport };

                page.render(renderCtx).promise.then(() => page.getTextContent()).then(textContent => {
                    textLayerDiv.innerHTML = ''; 
                    textLayerDiv.style.width = currentViewport.width + 'px';
                    textLayerDiv.style.height = currentViewport.height + 'px';

                    pdfjsLib.renderTextLayer({
                        textContent: textContent,
                        container: textLayerDiv,
                        viewport: currentViewport,
                        textDivs: []
                    });
                    
                    updateTextLayerScale();
                    pageIsRendering = false;
                    if (pageNumIsPending !== null) {
                        renderPage(pageNumIsPending);
                        pageNumIsPending = null;
                    }
                });

                pageInput.value = num;
                cssZoom = 100;
                pageContainer.style.width = cssZoom + '%';
            });
        };

        const queueRenderPage = num => {
            if (pageIsRendering) { pageNumIsPending = num; } else { renderPage(num); }
        };

        const showPrevPage = () => {
            if (pageNum <= 1) return;
            pageNum--; playFlipAnimation('prev'); queueRenderPage(pageNum);
        };

        const showNextPage = () => {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++; playFlipAnimation('next'); queueRenderPage(pageNum);
        };

        const goToPage = () => {
            let desiredPage = parseInt(pageInput.value);
            if (desiredPage >= 1 && desiredPage <= pdfDoc.numPages) {
                playFlipAnimation(desiredPage > pageNum ? 'next' : 'prev');
                pageNum = desiredPage; queueRenderPage(pageNum);
            } else { pageInput.value = pageNum; }
        };

        pageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') { goToPage(); pageInput.blur(); }
        });
        pageInput.addEventListener('change', goToPage);

        // --- CỬ CHỈ ZOOM ---
        wrapper.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                initialDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialZoom = cssZoom;
                pageContainer.style.transition = 'none'; 
            } else if (e.touches.length === 1) { touchStartX = e.touches[0].screenX; }
        }, { passive: false });

        wrapper.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault(); 
                const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (initialDistance) {
                    const scale = currentDistance / initialDistance;
                    let newZoom = initialZoom * scale;
                    if (newZoom < 100) newZoom = 100;
                    if (newZoom > 400) newZoom = 400;

                    const zoomRatio = newZoom / cssZoom;
                    const scrollCenterX = wrapper.scrollLeft + wrapper.clientWidth / 2;
                    const scrollCenterY = wrapper.scrollTop + wrapper.clientHeight / 2;

                    cssZoom = newZoom;
                    pageContainer.style.width = cssZoom + '%'; 
                    updateTextLayerScale();
                    wrapper.scrollLeft = scrollCenterX * zoomRatio - wrapper.clientWidth / 2;
                    wrapper.scrollTop = scrollCenterY * zoomRatio - wrapper.clientHeight / 2;
                }
            }
        }, { passive: false });

        wrapper.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialDistance = null; 
                pageContainer.style.transition = 'width 0.1s ease-out'; 
            }
            if (e.changedTouches.length === 1 && cssZoom === 100) {
                let touchEndX = e.changedTouches[0].screenX;
                if(document.activeElement === searchInput || document.activeElement === pageInput || window.getSelection().toString().length > 0) return;
                if (touchEndX < touchStartX - 60) showNextPage(); 
                if (touchEndX > touchStartX + 60) showPrevPage(); 
            }
        });

        // --- ZOOM BẰNG CHUỘT LĂN ---
        wrapper.addEventListener('wheel', (e) => {
            if (e.ctrlKey) {
                e.preventDefault(); 
                pageContainer.style.transition = 'none';
                let newZoom = cssZoom;
                if (e.deltaY < 0) newZoom += 15; else newZoom -= 15; 
                if (newZoom < 100) newZoom = 100;
                if (newZoom > 400) newZoom = 400;

                const zoomRatio = newZoom / cssZoom;
                const scrollCenterX = wrapper.scrollLeft + wrapper.clientWidth / 2;
                const scrollCenterY = wrapper.scrollTop + wrapper.clientHeight / 2;

                cssZoom = newZoom;
                pageContainer.style.width = cssZoom + '%';
                updateTextLayerScale();
                wrapper.scrollLeft = scrollCenterX * zoomRatio - wrapper.clientWidth / 2;
                wrapper.scrollTop = scrollCenterY * zoomRatio - wrapper.clientHeight / 2;
            }
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (document.activeElement === pageInput || document.activeElement === searchInput) return;
            if (e.key === 'ArrowRight') showNextPage();
            if (e.key === 'ArrowLeft') showPrevPage();
        });

        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            document.querySelector('#page-count').textContent = pdfDoc.numPages;
            renderPage(pageNum);
        }).catch(err => { alert('Lỗi: Không tìm thấy file Science.pdf!'); });
    </script>
</body>
</html>
