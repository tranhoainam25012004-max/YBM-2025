    <title>Family Collocations - Pro Tool</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --light-bg: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #ebf0f3;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .nav-tabs {
            display: flex; width: 100%; background: var(--primary);
            position: sticky; top: 0; z-index: 1000; box-shadow: var(--shadow);
        }

        .tab-item {
            flex: 1; text-align: center; padding: 15px 0;
            color: #bdc3c7; text-transform: uppercase; font-weight: bold;
            font-size: 14px; cursor: pointer; border-bottom: 4px solid transparent;
            transition: 0.3s;
        }

        .tab-item.active {
            color: var(--white); border-bottom: 4px solid var(--accent);
            background: rgba(255,255,255,0.1);
        }

        .container { width: 100%; max-width: 600px; padding: 20px; margin-top: 10px; }

        /* Flashcard Section */
        #flashcard-section { display: flex; flex-direction: column; gap: 20px; animation: fadeIn 0.5s; }

        .scene { width: 100%; height: 280px; perspective: 1000px; }
        .card {
            width: 100%; height: 100%; position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }

        .card__face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 25px;
            border-radius: 20px; box-shadow: var(--shadow); text-align: center;
        }

        .card__face--front { background: var(--white); color: var(--primary); border: 2px solid var(--accent); }
        .card__face--back { background: var(--accent); color: var(--white); transform: rotateY(180deg); }

        .word-en { font-size: 1.6rem; font-weight: bold; margin-bottom: 10px; }
        .ipa { font-family: 'Lucida Sans Unicode', sans-serif; color: #7f8c8d; font-size: 1.1rem; margin-bottom: 15px; }
        .speaker-icon { 
            font-size: 2rem; color: var(--accent); background: #eef7ff; 
            padding: 10px; border-radius: 50%; transition: 0.2s;
        }
        .speaker-icon:hover { transform: scale(1.1); }

        .example-box {
            background: #fff; padding: 15px; border-radius: 12px;
            border-left: 5px solid var(--accent); box-shadow: var(--shadow);
            margin-top: 10px; line-height: 1.6;
        }
        .example-label { font-weight: bold; color: var(--accent); font-size: 0.9rem; display: block; margin-bottom: 5px; }
        .ex-en { font-style: italic; color: #34495e; display: block; margin-bottom: 5px; }
        .ex-vi { color: #27ae60; font-size: 0.95rem; border-top: 1px dashed #eee; display: none; padding-top: 5px; }
        .show-ex-vi { display: block !important; }
        .hide-ex-en { display: none !important; }

        .controls { display: flex; align-items: center; gap: 10px; justify-content: space-between; margin-top: 10px; }
        .btn {
            padding: 12px 10px; border: none; border-radius: 10px;
            background: var(--white); font-weight: bold; cursor: pointer; flex: 1;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 0.9rem; transition: 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-flip { background: #9b59b6; color: white; }

        /* Quiz Section */
        #quiz-section { display: none; animation: fadeIn 0.5s; }
        .quiz-item { background: var(--white); padding: 20px; border-radius: 15px; margin-bottom: 20px; box-shadow: var(--shadow); }
        .quiz-question { font-weight: bold; margin-bottom: 15px; color: var(--primary); line-height: 1.4; }
        .option {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #ddd; border-radius: 10px; background: #fff;
            text-align: left; cursor: pointer; font-size: 0.95rem;
        }
        .option:hover { background: #f0f7ff; }
        .option.selected { border-color: var(--accent); background: #eef7ff; }
        .option.correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .option.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger); }

        .hint-btn {
            background: #f1c40f; color: #fff; border: none; padding: 5px 12px;
            border-radius: 5px; font-size: 0.8rem; cursor: pointer; margin-top: 10px;
        }
        .explanation {
            margin-top: 12px; padding: 12px; background: #e8f4fd;
            border-left: 4px solid var(--accent); border-radius: 4px;
            font-size: 0.9rem; color: #2c3e50; display: none; animation: fadeIn 0.3s;
        }
        .show-explain { display: block !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>

    let vocabulary = [];
    let currentIdx = 0;
    let globalDefaultFace = 'front';
    let userChoices = Array(questions.length).fill(null);

    // Hàm xáo trộn mảng (Fisher-Yates)
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // --- FLASHCARD LOGIC ---
    function updateExampleFace() {
        const card = document.getElementById('main-card');
        const exEn = document.getElementById('text-ex-en');
        const exVi = document.getElementById('text-ex-vi');
        if (card.classList.contains('is-flipped')) {
            exEn.classList.add('hide-ex-en'); exVi.classList.add('show-ex-vi');
        } else {
            exEn.classList.remove('hide-ex-en'); exVi.classList.remove('show-ex-vi');
        }
    }

    function toggleFlip(e) {
        if (e && e.target.classList.contains('speaker-icon')) return;
        document.getElementById('main-card').classList.toggle('is-flipped');
        updateExampleFace();
    }

    function toggleGlobalFlip() {
        globalDefaultFace = (globalDefaultFace === 'front') ? 'back' : 'front';
        const flipBtn = document.getElementById('btn-master-flip');
        flipBtn.innerText = (globalDefaultFace === 'front') ? "Mặt sau (Vi)" : "Mặt trước (En)";
        renderCard();
    }

   function renderCard() {
    if (vocabulary.length === 0) return;
    const item = vocabulary[currentIdx];
    const card = document.getElementById('main-card');
    const container = document.getElementById('word-list-container');
    
    // Xóa nội dung cũ và tạo danh sách từ mới
    container.innerHTML = '';
    item.words.forEach((w, index) => {
        const wordDiv = document.createElement('div');
        wordDiv.style.marginBottom = "15px";
        wordDiv.innerHTML = `
            <div class="word-en" style="margin-bottom: 2px; font-size: ${item.words.length > 3 ? '1.2rem' : '1.6rem'}">${w.en}</div>
            <div class="ipa" style="margin-bottom: 5px; font-size: 0.9rem;">${w.ipa}</div>
            <div class="speaker-icon" style="font-size: 1.2rem; padding: 5px; display: inline-block;" 
                 onclick="speakSingleWord(event, '${w.en}')">🔊</div>
        `;
        container.appendChild(wordDiv);
    });

    // Cập nhật mặt sau và ví dụ
    document.getElementById('text-vi').innerText = item.vi;
    document.getElementById('text-ex-en').innerText = `"${item.ex}"`;
    document.getElementById('text-ex-vi').innerText = `"${item.exVi}"`;
    document.getElementById('counter').innerText = `${currentIdx + 1} / ${vocabulary.length}`;
    
    if (globalDefaultFace === 'back') card.classList.add('is-flipped');
    else card.classList.remove('is-flipped');
    updateExampleFace();
}

// Hàm phát âm từng từ riêng biệt
function speakSingleWord(e, text) {
    e.stopPropagation(); // Ngăn lật thẻ khi bấm vào loa
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    msg.rate = 0.9;
    window.speechSynthesis.speak(msg);
}


    function changeCard(dir) {
        currentIdx = (currentIdx + dir + vocabulary.length) % vocabulary.length;
        renderCard();
    }
function speakWord(e) {
        e.stopPropagation();
        // Lấy danh sách từ trong mảng words
        const words = vocabulary[currentIdx].words;
        
        // Tạo chuỗi văn bản bao gồm tất cả các từ tiếng Anh trong thẻ để phát âm
        // Hoặc bạn có thể chỉ phát âm từ đầu tiên: const text = words[0].en;
        const textToSpeak = words.map(w => w.en).join(', ');

        const msg = new SpeechSynthesisUtterance(textToSpeak);
        msg.lang = 'en-US';
        msg.rate = 0.9; // Tốc độ nói hơi chậm lại một chút để nghe rõ hơn
        window.speechSynthesis.speak(msg);
    }

    // --- QUIZ LOGIC ---
  function renderQuiz() {
    const container = document.getElementById('quiz-list');
    container.innerHTML = '';
    questions.forEach((q, qIdx) => {
        const div = document.createElement('div');
        div.className = 'quiz-item';
        div.innerHTML = `
            <div class="quiz-question"><b>Câu ${qIdx + 1}:</b> ${q.question}</div>
            <div style="color: #666; font-size: 0.85rem; margin-bottom: 10px;"><i>${q.translation}</i></div>
            <div class="options-container">
                ${q.options.map((opt, oIdx) => `
                    <button class="option" id="q${qIdx}o${oIdx}" onclick="selectOption(${qIdx}, ${oIdx})">
                        ${String.fromCharCode(65 + oIdx)}. ${opt}
                    </button>
                `).join('')}
            </div>
            <button class="hint-btn" onclick="toggleHint(${qIdx})">Xem giải thích</button>
            <div class="explanation" id="hint-${qIdx}">
                <div style="color: var(--success); font-weight: bold; margin-bottom: 5px;">Đáp án: ${q.answer}</div>
                ${q.explanation}
            </div>
        `;
        container.appendChild(div);
    });
}

    function selectOption(qIdx, oIdx) {
        userChoices[qIdx] = oIdx;
        const opts = document.querySelectorAll(`[id^="q${qIdx}o"]`);
        opts.forEach(btn => btn.classList.remove('selected'));
        document.getElementById(`q${qIdx}o${oIdx}`).classList.add('selected');
    }

    function toggleHint(qIdx) {
        document.getElementById(`hint-${qIdx}`).classList.toggle('show-explain');
    }

    function gradeQuiz() {
    questions.forEach((q, qIdx) => {
        document.getElementById(`hint-${qIdx}`).classList.add('show-explain');
        const opts = document.querySelectorAll(`[id^="q${qIdx}o"]`);
        
        // Chuyển câu trả lời đúng từ chữ (A, B, C, D) sang số (0, 1, 2, 3)
        const correctIdx = q.answer.charCodeAt(0) - 65;

        opts.forEach((btn, oIdx) => {
            btn.classList.remove('correct', 'wrong');
            if (oIdx === correctIdx) {
                btn.classList.add('correct');
            } else if (oIdx === userChoices[qIdx]) {
                btn.classList.add('wrong');
            }
        });
    });
    alert("Đã kiểm tra xong! Hãy xem giải thích chi tiết bên dưới mỗi câu.");
}

    function switchTab(target) {
        document.getElementById('flashcard-section').style.display = (target === 'flashcard') ? 'flex' : 'none';
        document.getElementById('quiz-section').style.display = (target === 'quiz') ? 'block' : 'none';
        document.getElementById('tab-flash').classList.toggle('active', target === 'flashcard');
        document.getElementById('tab-quiz').classList.toggle('active', target === 'quiz');
        if (target === 'quiz') renderQuiz();
    }

    // Khởi tạo: Xáo trộn dữ liệu ngay từ đầu
    vocabulary = shuffle([...rawVocabulary]);
    renderCard();
