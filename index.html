<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Learning Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📚</text></svg>">
    <style>
        :root {
            --primary: #2563eb;
            --ybm: #e11d48;
            --vocab: #059669;
            --bg: #f8fafc;
            --text: #1e293b;
            --white: #ffffff;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.2rem;
            margin: 0;
            background: linear-gradient(to right, var(--primary), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .section-title {
            grid-column: 1 / -1;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-top: 10px;
        }

        .card {
            background: var(--white);
            border-radius: 20px;
            padding: 25px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: var(--primary);
        }

        .icon-box {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        /* Màu sắc riêng cho từng loại */
        .bg-ybm { background: #fff1f2; color: var(--ybm); }
        .bg-word { background: #ecfdf5; color: var(--vocab); }
        .bg-colo { background: #eff6ff; color: var(--primary); }
        .bg-idiom { background: #fefce8; color: #ca8a04; }

        .info h2 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .info p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            color: #64748b;
        }

        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Hệ Thống Tự Học TOEIC</h1>
        <p style="color: #64748b;">Nâng cao kỹ năng mỗi ngày cùng YBM 2025</p>
    </div>

    <div class="container">
        <div class="section-title">Luyện giải đề</div>
        
        <a href="ybm_tests.html" class="card">
            <div class="icon-box bg-ybm">📚</div>
            <div class="info">
                <h2>Giáo trình YBM</h2>
                <p>Tổng hợp Test 2, Test 3...</p>
            </div>
        </a>

        <div class="section-title">Kỹ năng bổ trợ (Vocabulary)</div>

        <a href="word_formation.html" class="card">
            <div class="icon-box bg-word">🏗️</div>
            <div class="info">
                <h2>Word Formation</h2>
                <p>Cấu trúc từ và gia đình từ</p>
            </div>
        </a>

        <a href="collocation.html" class="card">
            <div class="icon-box bg-colo">🔗</div>
            <div class="info">
                <h2>Collocations</h2>
                <p>Các cụm từ thường đi cùng nhau</p>
            </div>
        </a>

        <a href="idioms.html" class="card">
            <div class="icon-box bg-idiom">💡</div>
            <div class="info">
                <h2>Idioms</h2>
                <p>Thành ngữ và cụm từ cố định</p>
            </div>
        </a>
    </div>

</body>
</html>
